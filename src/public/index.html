<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Générateur de documents</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- ========================== -->
    <!-- 🔹 Formulaire Ajout Client -->
    <!-- ========================== -->
    <div class="card">
      <h2>Ajouter un client</h2>
      <form id="newClientForm">
        <div class="form-group">
          <input id="nameInput" placeholder="Nom du client" required />
        </div>
        <div class="form-group">
          <input id="idInput" placeholder="User ID" required />
        </div>
        <button type="button" id="addClientBtn">Ajouter</button>
      </form>
    </div>

    <!-- ========================== -->
    <!-- 🔹 Sélection Clients pour Batch -->
    <!-- ========================== -->
    <div class="card">
      <h1>Générateur de documents</h1>
      <div class="form-group">
        <label for="clientSelect">Choisir des clients</label>
        <select id="clientSelect" multiple></select>
      </div>
      <button id="launchBtn">Lancer le batch</button>
    </div>

    <!-- ========================== -->
    <!-- 🔹 Résultat / Feedback -->
    <!-- ========================== -->
    <div class="card result-card">
      <h2>Résultat</h2>
      <div id="output"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
